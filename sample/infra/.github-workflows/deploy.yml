# Deploy workflow — runs on push to main.
#
# Jobs:
#   build-and-push  — builds the production Docker image and pushes to GHCR
#   deploy          — SSH's into EC2, pulls the new image, and restarts services
#
# Vercel deploys the Next.js frontend automatically on push to main via git
# integration — no step in this workflow is needed for the frontend.
#
# Required GitHub repository secrets:
#   EC2_HOST       — Elastic IP of the EC2 instance (from Terraform output)
#   EC2_SSH_KEY    — Private SSH key corresponding to the EC2 key pair
#
# GITHUB_TOKEN is provided automatically and has write access to GHCR.
#
# Copy this file to .github/workflows/deploy.yml in your monorepo.

name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/v1-mono-api

jobs:

  # ---------------------------------------------------------------------------
  # Build and push the API Docker image to GHCR
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build and push API image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write  # Required to push to GHCR

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: api
          file: .docker/production/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GHCR to speed up subsequent builds
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ---------------------------------------------------------------------------
  # Deploy to EC2 via SSH
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    environment: production  # Requires manual approval if configured in GitHub settings

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /opt/myproject

            # Pull the latest code (entrypoint scripts, compose files, Terraform, etc.)
            git pull origin main

            # Pull the new API image — beat and worker reuse the same image
            docker compose -f .docker/production/docker-compose.yaml pull api

            # Restart all services with the new image, remove stopped containers
            docker compose -f .docker/production/docker-compose.yaml up -d --remove-orphans

            # Remove dangling images to free disk space
            docker image prune -f

            echo "[deploy] Done — $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Check that the api container is running and healthy
            docker compose -f /opt/myproject/.docker/production/docker-compose.yaml ps api
